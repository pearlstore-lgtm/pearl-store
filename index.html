<!DOCTYPE html>
<html lang="ar" dir="rtl" id="mainHtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pearl | Official Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Segoe+UI:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --nibeti: #630d0d; --gold: #d4af37; --soft-bg: rgba(255, 248, 240, 0.6); }
        html { scroll-behavior: smooth; }
        body { 
            font-family: 'Segoe UI', sans-serif; margin: 0; background-color: #fff;
            background-image: url('Logo-img.jpeg'); background-repeat: no-repeat;
            background-position: center 200px; background-size: 80%; background-attachment: fixed;
            position: relative; overflow-x: hidden;
        }
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 255, 255, 0.8); z-index: -1; }

        /* Header */
        header { 
            background-color: var(--nibeti); color: white; padding: 12px 5%; 
            display: grid; grid-template-columns: auto 1fr auto; align-items: center; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); position: sticky; top: 0; z-index: 1000; 
        }
        .header-logo { height: 45px; mix-blend-mode: screen; }
        .main-nav { display: flex; justify-content: center; gap: 20px; }
        .main-nav a { color: white; text-decoration: none; font-weight: 600; font-size: 14px; transition: 0.3s; }
        .lang-btn { background: transparent; color: white; border: 1px solid rgba(255,255,255,0.4); padding: 5px 12px; border-radius: 20px; cursor: pointer; }

        /* Sidebar Navigation */
        @keyframes sideWave { 0%, 100% { transform: translateX(0); } 50% { transform: translateX(-8px); } }
        .sidebar-nav { position: fixed; top: 150px; z-index: 500; display: flex; flex-direction: column; gap: 12px; }
        [dir="rtl"] .sidebar-nav { right: 0; } [dir="ltr"] .sidebar-nav { left: 0; }
        .nav-category { 
            background: var(--nibeti); padding: 12px 25px; cursor: pointer; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.2); animation: sideWave 3s infinite ease-in-out; 
            transition: 0.3s; color: white; font-weight: bold; font-size: 14px;
        }
        [dir="rtl"] .nav-category { border-radius: 25px 0 0 25px; border-left: 4px solid var(--gold); }
        [dir="ltr"] .nav-category { border-radius: 0 25px 25px 0; border-right: 4px solid var(--gold); }

        /* Sections */
        section { padding: 40px 5%; margin: 20px auto; max-width: 1100px; background: var(--soft-bg); border-radius: 30px; backdrop-filter: blur(5px); text-align: center; }
        .section-title { font-family: 'Playfair Display', serif; font-size: 32px; color: var(--nibeti); margin-bottom: 30px; }

        /* Products Card */
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 25px; }
        .card { background: white; border-radius: 20px; padding: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); transition: 0.3s; border: 1px solid #f0f0f0; }
        .card:hover { transform: translateY(-5px); }
        .card img { width: 100%; border-radius: 15px; margin-bottom: 15px; height: 200px; object-fit: cover; }
        .buy-btn { width: 100%; background: var(--nibeti); color: white; border: none; padding: 12px; border-radius: 10px; cursor: pointer; font-weight: 700; margin-top: 10px; transition: 0.2s; }
        .buy-btn:active { transform: scale(0.95); }

        /* Cart Sidebar */
        .cart-sidebar { 
            position: fixed; top: 0; width: 320px; height: 100%; background: white; z-index: 2000; 
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: -5px 0 25px rgba(0,0,0,0.3); padding: 25px; display: flex; flex-direction: column; 
        }
        [dir="rtl"] .cart-sidebar { right: -380px; } [dir="ltr"] .cart-sidebar { left: -380px; }
        .cart-sidebar.open { right: 0; left: auto; }
        [dir="ltr"] .cart-sidebar.open { left: 0; right: auto; }
        
        .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid #eee; }
        .cart-count-badge { position: absolute; top: -5px; right: -5px; background: var(--gold); color: var(--nibeti); font-size: 12px; padding: 3px 8px; border-radius: 50%; font-weight: bold; }

        /* Floating Cart Button */
        .floating-cart { 
            position: fixed; bottom: 30px; width: 65px; height: 65px; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; z-index: 1000; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.3); cursor: pointer; background: var(--nibeti); color: white; 
        }
        [dir="rtl"] .floating-cart { left: 30px; } [dir="ltr"] .floating-cart { right: 30px; }
    </style>
</head>
<body>

<header>
    <img src="Logo-img.jpeg" class="header-logo">
    <nav class="main-nav">
        <a href="#home" id="linkHome">الرئيسية</a>
        <a href="#products" id="linkStore">المنتجات</a>
    </nav>
    <button class="lang-btn" onclick="toggleLanguage()" id="langBtn">EN</button>
</header>

<div class="sidebar-nav" id="sidebar"></div>

<div id="cartSidebar" class="cart-sidebar">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h2 id="cartTitle" style="color:var(--nibeti); margin:0;">سلة المشتريات</h2>
        <i class="fas fa-times" onclick="toggleCart()" style="cursor:pointer; font-size:24px;"></i>
    </div>
    <div id="cartItems" style="flex-grow:1; overflow-y:auto; margin-top:20px;"></div>
    <div style="border-top:2px solid var(--nibeti); padding-top:20px;">
        <div style="display:flex; justify-content:space-between; font-weight:bold; font-size:18px; margin-bottom:15px;">
            <span id="textTotal">الإجمالي:</span>
            <span id="cartTotalSum">0 EGP</span>
        </div>
        <button class="buy-btn" onclick="sendOrder()" style="background:#25D366; font-size:16px;">
            <i class="fab fa-whatsapp"></i> <span id="textOrderNow">إرسال الطلب عبر واتساب</span>
        </button>
    </div>
</div>

<section id="home" style="background:transparent;">
    <h1 id="heroTitle" style="font-size:45px; color:var(--nibeti); margin-bottom:10px;">متجر Pearl</h1>
    <p id="heroDesc" style="font-size:18px; color:#555;">أرقى منتجات العناية بالبشرة والشعر</p>
</section>

<section id="products">
    <h2 class="section-title" id="titleProducts">منتجاتنا المميزة</h2>
    <div id="productsGrid" class="products-grid"></div>
</section>

<div class="floating-cart" onclick="toggleCart()">
    <i class="fas fa-shopping-bag" style="font-size:26px;"></i>
    <span id="cartCount" class="cart-count-badge">0</span>
</div>

<script>
    let currentLang = 'ar';
    let cart = [];
    const myWhatsApp = "201204477877";

    const translations = {
        ar: {
            langBtn: 'EN', linkHome: 'الرئيسية', linkStore: 'المنتجات',
            heroTitle: 'متجر Pearl', heroDesc: 'جمالك يبدأ من هنا.. أرقى مستحضرات العناية.',
            titleProducts: 'قائمة المنتجات', addBtn: 'أضف للسلة', cartTitle: 'سلتك', textTotal: 'الإجمالي:', textOrderNow: 'إتمام الطلب (واتساب)',
            categories: { all: 'الكل', skincare: 'سكين كير', hair: 'شعر', skin: 'بشرة', deo: 'مزيلات' }
        },
        en: {
            langBtn: 'AR', linkHome: 'Home', linkStore: 'Store',
            heroTitle: 'Pearl Store', heroDesc: 'Premium Skin & Hair Care Solutions.',
            titleProducts: 'Our Products', addBtn: 'Add to Cart', cartTitle: 'Your Cart', textTotal: 'Total:', textOrderNow: 'Checkout via WhatsApp',
            categories: { all: 'All', skincare: 'Skin Care', hair: 'Hair', skin: 'Body', deo: 'Deodorants' }
        }
    };

    // يمكنك تغيير الروابط والأسعار هنا بسهولة
    const productsData = [
        { id: 1, category: 'hair', titleAr: "شامبو ترميم", titleEn: "Repair Shampoo", price: 450, img: "https://images.unsplash.com/photo-1535585209827-a15fcdbc4c2d?w=400" },
        { id: 2, category: 'skincare', titleAr: "سيروم النضارة", titleEn: "Glow Serum", price: 550, img: "https://images.unsplash.com/photo-1620916566398-39f1143ab7be?w=400" },
        { id: 3, category: 'skin', titleAr: "لوشن مرطب", titleEn: "Body Lotion", price: 320, img: "https://images.unsplash.com/photo-1556228720-195a672e8a03?w=400" }
    ];

    function toggleLanguage() {
        currentLang = currentLang === 'ar' ? 'en' : 'ar';
        document.getElementById('mainHtml').dir = currentLang === 'ar' ? 'rtl' : 'ltr';
        updateUI();
    }

    function updateUI() {
        const t = translations[currentLang];
        document.getElementById('langBtn').innerText = t.langBtn;
        document.getElementById('linkHome').innerText = t.linkHome;
        document.getElementById('linkStore').innerText = t.linkStore;
        document.getElementById('heroTitle').innerText = t.heroTitle;
        document.getElementById('heroDesc').innerText = t.heroDesc;
        document.getElementById('titleProducts').innerText = t.titleProducts;
        document.getElementById('cartTitle').innerText = t.cartTitle;
        document.getElementById('textTotal').innerText = t.textTotal;
        document.getElementById('textOrderNow').innerText = t.textOrderNow;

        const sidebar = document.getElementById('sidebar');
        sidebar.innerHTML = Object.keys(t.categories).map(key => `
            <div class="nav-category" onclick="filterProducts('${key}')">
                <span>${t.categories[key]}</span>
            </div>
        `).join('');
        displayProducts(productsData);
    }

    function displayProducts(list) {
        const grid = document.getElementById('productsGrid');
        grid.innerHTML = list.map(p => `
            <div class="card">
                <img src="${p.img}">
                <div style="font-weight:700; font-size:18px; margin-bottom:5px;">${currentLang === 'ar' ? p.titleAr : p.titleEn}</div>
                <div style="color:var(--nibeti); font-weight:bold; font-size:16px;">${p.price} EGP</div>
                <button class="buy-btn" onclick="addToCart(${p.id})">${translations[currentLang].addBtn}</button>
            </div>
        `).join('');
    }

    function addToCart(id) {
        const product = productsData.find(p => p.id === id);
        const itemInCart = cart.find(i => i.id === id);
        if (itemInCart) itemInCart.qty++;
        else cart.push({ ...product, qty: 1 });
        updateCartDisplay();
        if(!document.getElementById('cartSidebar').classList.contains('open')) toggleCart();
    }

    function updateCartDisplay() {
        const cartContainer = document.getElementById('cartItems');
        const count = cart.reduce((acc, i) => acc + i.qty, 0);
        const total = cart.reduce((acc, i) => acc + (i.price * i.qty), 0);

        document.getElementById('cartCount').innerText = count;
        document.getElementById('cartTotalSum').innerText = total + " EGP";

        cartContainer.innerHTML = cart.map(item => `
            <div class="cart-item">
                <div>
                    <div style="font-weight:bold;">${currentLang === 'ar' ? item.titleAr : item.titleEn}</div>
                    <small>${item.price} EGP x ${item.qty}</small>
                </div>
                <div style="display:flex; align-items:center; gap:8px;">
                    <button onclick="changeQty(${item.id}, -1)" style="border:none; background:#f0f0f0; border-radius:5px; padding:2px 8px;">-</button>
                    <span>${item.qty}</span>
                    <button onclick="changeQty(${item.id}, 1)" style="border:none; background:#f0f0f0; border-radius:5px; padding:2px 8px;">+</button>
                </div>
            </div>
        `).join('');
    }

    function changeQty(id, amount) {
        const item = cart.find(i => i.id === id);
        item.qty += amount;
        if (item.qty <= 0) cart = cart.filter(i => i.id !== id);
        updateCartDisplay();
    }

    function toggleCart() {
        document.getElementById('cartSidebar').classList.toggle('open');
    }

    function filterProducts(cat) {
        if(cat === 'all') displayProducts(productsData);
        else displayProducts(productsData.filter(p => p.category === cat));
        window.location.href = '#products';
    }

    function sendOrder() {
        if (cart.length === 0) return alert(currentLang === 'ar' ? "السلة فارغة!" : "Cart is empty!");
        let msg = `طلب جديد من Pearl Store:\n--------------------\n`;
        cart.forEach(i => {
            msg += `• ${currentLang === 'ar' ? i.titleAr : i.titleEn} | العدد: ${i.qty} | السعر: ${i.price * i.qty} EGP\n`;
        });
        msg += `--------------------\nإجمالي الفاتورة: ${document.getElementById('cartTotalSum').innerText}`;
        window.open(`https://wa.me/${myWhatsApp}?text=${encodeURIComponent(msg)}`, '_blank');
    }

    updateUI();
</script>
</body>
</html>
